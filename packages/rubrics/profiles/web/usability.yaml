name: usability
applies_to_targets: [web, desktop]
applies_to_modes: [free, grounded, targeted]
weight_in_overall: 1.0

dimensions:
  - id: clarity
    weight: 1.0
    description: |
      Can a new user tell what the product does and what to do next on each
      screen? Are labels, headers, and CTAs unambiguous?
    scoring_anchors:
      0: "A new user cannot tell what the product does or which visible action to take next on primary screens."
      5: "The product purpose is understandable, but some visited screens have ambiguous labels, competing CTAs, or jargon that forces guessing."
      10: "The product purpose and next action are obvious on each visited screen; labels and structure match user vocabulary."
    evidence_required: at_least_one_observation_id
    common_signals:
      positive:
        - "one obvious primary CTA per screen"
        - "labels match user vocabulary"
      negative:
        - "jargon without explanation"
        - "two competing CTAs"
        - "ambiguous icon-only buttons"
